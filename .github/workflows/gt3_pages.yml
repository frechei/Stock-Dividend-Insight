name: gt3-pages

on:
  workflow_dispatch:
  schedule:
    - cron: "5 7 * * *"

permissions:
  contents: write

concurrency:
  group: gt3-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stock_dividend_insight
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stock_dividend_insight
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby
          bundler-cache: true

      - name: Install libpq
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Migrate
        run: bundle exec rake migrate

      - name: Sync gt3
        run: bundle exec ruby sync_stocks.rb --gt3

      - name: Generate static page
        run: bundle exec ruby scripts/gt3_pages.rb

      - name: Commit generated files
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "no changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/gt3
          git commit -m "chore: update gt3 page $(date -u +%F)"
          for i in 1 2 3; do
            git pull --rebase origin main
            if git push; then
              exit 0
            fi
            echo "push failed (attempt=${i}), retrying..."
            sleep 2
          done
          exit 1
